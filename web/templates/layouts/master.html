<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="KOmpanion">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon.svg">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/monospace.css">
    <link rel="stylesheet" href="/static/static.css">
    <script>
      // 注册Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/static/service-worker.js')
            .then(registration => {
              console.log('Service Worker registered with scope:', registration.scope);
            })
            .catch(error => {
              console.error('Service Worker registration failed:', error);
            });
        });
      }
    </script>
</head>

<body>

    <!-- Main site header -->
    <header class="header">
        <table>
            <tr>
                <td style="flex-grow: 1;">KOmpanion</td>
                {{ if .isAuthenticated }}
                <td><a href="/books/">> Books</a></td>
                <td><a href="/stats/">> Statistics</a></td>
                <td><a href="/devices/">> Devices</a></td>
                <td><a href="/auth/logout/">Log Out</a></td>
                {{ else }}
                <td>Login Page</td>
                {{ end}}
            </tr>
        </table>
    </header>


    <main>
        {{ block "content" . }}Default Content{{ end }}
    </main>

    <footer>
        <!-- Simple Footer -->
        <hr> <!-- Adds a nice divider line -->
        <p style="text-align: center; color: var(--text-color-alt);">
            Powered by <a href="https://github.com/banjuer/kompanion/">KOmpanion</a>, Version: <strong>{{ Version }}</strong>, Page: <strong>{{ LoadTimes .startTime }}</strong>
        </p>
    </footer>

    <!-- Custom Modal -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <span id="modal-title" class="modal-title"></span>
                </div>
                <div class="modal-body">
                    <p id="modal-message"></p>
                </div>
                <div class="modal-footer" id="modal-footer">
                    <button type="button" class="button modal-btn-cancel" id="modal-btn-cancel" style="display: none;">Cancel</button>
                    <button type="button" class="button modal-btn-ok" id="modal-btn-ok">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        const overlay = document.getElementById('modal-overlay');
        const titleEl = document.getElementById('modal-title');
        const messageEl = document.getElementById('modal-message');
        const btnOk = document.getElementById('modal-btn-ok');
        const btnCancel = document.getElementById('modal-btn-cancel');

        let currentCallback = null;

        function openModal(title, message, showCancel, callback) {
            titleEl.textContent = title || '';
            messageEl.textContent = message || '';
            btnCancel.style.display = showCancel ? '' : 'none';
            currentCallback = callback;
            overlay.style.display = 'flex';
            btnOk.focus();
        }

        function closeModal() {
            overlay.style.display = 'none';
            currentCallback = null;
        }

        btnOk.addEventListener('click', function() {
            const cb = currentCallback;
            closeModal();
            if (cb) cb(true);
        });

        btnCancel.addEventListener('click', function() {
            const cb = currentCallback;
            closeModal();
            if (cb) cb(false);
        });

        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                const cb = currentCallback;
                closeModal();
                if (cb) cb(false);
            }
        });

        document.addEventListener('keydown', function(e) {
            if (overlay.style.display === 'none') return;
            if (e.key === 'Escape') {
                const cb = currentCallback;
                closeModal();
                if (cb) cb(false);
            }
            if (e.key === 'Enter') {
                const cb = currentCallback;
                closeModal();
                if (cb) cb(true);
            }
        });

        window.showAlert = function(message, title) {
            openModal(title || 'Notice', message, false, null);
        };

        window.showConfirm = function(message, title, callback) {
            if (typeof title === 'function') {
                callback = title;
                title = 'Confirm';
            }
            openModal(title || 'Confirm', message, true, callback);
        };
    })();
    </script>

</body>

</html>
